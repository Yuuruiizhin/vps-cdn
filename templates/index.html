<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CDN Manager - Visual & Direct</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--card); border-radius: 12px; margin-bottom: 25px; border: 1px solid #334155; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .file-card { background: var(--card); border-radius: 12px; border: 1px solid #334155; overflow: hidden; display: flex; flex-direction: column; }
        
        .preview { height: 160px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .preview img, .preview video { width: 100%; height: 100%; object-fit: cover; }
        
        .info { padding: 15px; flex-grow: 1; }
        .filename { font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Contenedor del Link */
        .link-container { display: flex; gap: 5px; margin-top: 10px; }
        .url-input { background: #0f172a; border: 1px solid #334155; color: var(--accent); padding: 8px; border-radius: 4px; font-size: 0.75rem; width: 100%; outline: none; }
        
        .btn { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn-copy { background: var(--accent); color: #0f172a; padding: 5px 10px; font-size: 0.7rem; }
        .btn-del { background: #ef4444; color: white; padding: 5px 10px; font-size: 0.7rem; margin-top: 10px; width: 100%; }
        
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📦 CDN Personal</h2>
        <div>
            <input type="file" id="fileInput">
            <button class="btn btn-copy" style="font-size: 1rem;" onclick="upload()">Subir Archivo</button>
        </div>
    </div>

    <div class="grid" id="gallery">
        {% for file in files %}
        <div class="file-card">
            <div class="preview">
                {% if file.type == 'image' %}
                    <img src="{{ file.relative_url }}" loading="lazy">
                {% elif file.type == 'video' %}
                    <video src="{{ file.relative_url }}" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
                {% else %}
                    <span style="font-size: 3rem;">📄</span>
                {% endif %}
            </div>
            <div class="info">
                <div class="filename">{{ file.name }}</div>
                
                <label style="font-size: 0.65rem; color: #64748b;">URL para usar (Link del CDN):</label>
                <div class="link-container">
                    <input type="text" readonly class="url-input" 
                           id="input-{{ loop.index }}" 
                           onclick="this.select()" 
                           value="">
                    <button class="btn btn-copy" onclick="copyAction('input-{{ loop.index }}')">Copiar</button>
                </div>
                
                <button class="btn btn-del" onclick="remove('{{ file.name }}')">Eliminar Archivo</button>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
    // Al cargar la página, llenamos los inputs con la URL real (IP o Dominio)
    window.onload = function() {
        const inputs = document.querySelectorAll('.url-input');
        inputs.forEach(input => {
            // Obtenemos el nombre del archivo desde el final de su ID o un atributo
            const filename = input.closest('.info').querySelector('.filename').innerText;
            input.value = window.location.origin + '/cdn/' + filename;
        });
    };

    function copyAction(inputId) {
        const copyText = document.getElementById(inputId);
        copyText.select();
        copyText.setSelectionRange(0, 99999); // Para móviles

        try {
            // Intento de copiado automático
            navigator.clipboard.writeText(copyText.value);
            alert("Link copiado al portapapeles");
        } catch (err) {
            // Si falla, el texto ya está seleccionado para copiar a mano
            alert("No se pudo copiar automáticamente. Por favor usa Ctrl+C / Cmd+C");
        }
    }

    async function upload() {
        const input = document.getElementById('fileInput');
        if (!input.files[0]) return alert("Selecciona un archivo");
        const formData = new FormData();
        formData.append('file', input.files[0]);
        const res = await fetch('/upload', { method: 'POST', body: formData });
        if (res.ok) location.reload();
    }

    async function remove(name) {
        if (!confirm('¿Borrar ' + name + '?')) return;
        const res = await fetch('/delete/' + name, { method: 'DELETE' });
        if (res.ok) location.reload();
    }
</script>

</body>
</html>
